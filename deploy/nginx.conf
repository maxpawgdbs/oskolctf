server {
    listen 80;
    server_name oskolctf.ddns.net;
    return 301 https://oskolctf.ddns.net:8443$request_uri;
}

server {
    listen 80 default_server;
    server_name _;
    return 444;
}

server {
    listen 8443 ssl http2;
    server_name oskolctf.ddns.net;

    ssl_certificate /etc/letsencrypt/live/oskolctf.ddns.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oskolctf.ddns.net/privkey.pem;

    client_max_body_size 16M;

    location / {
        proxy_pass http://app:8005;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60;
    }
}

server {
    listen 8443 ssl default_server;
    server_name _;

    ssl_certificate /etc/letsencrypt/live/oskolctf.ddns.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oskolctf.ddns.net/privkey.pem;

    return 444;
}

