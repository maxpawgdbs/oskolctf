services:
  app:
    build: .
    restart: unless-stopped
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
      - DEBUG=${DEBUG:-0}
      # Пароль для суперюзеров nekoty/shellovx/gdbs (смени при деплое!)
      - SUPERUSER_PASSWORD=${SUPERUSER_PASSWORD:-ChangeMe123!}
    volumes:
      # База данных хранится снаружи контейнера — не теряется при пересборке
      - ./data:/data
      # Медиафайлы (аватарки) — хранятся между перезапусками
      - ./media:/app/media
      # tasks.json — rw чтобы изменения через веб сохранялись в файл
      - ./tasks.json:/app/tasks.json
      # Файлы задач
      - ./task:/app/task
    expose:
      - "8005"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "8443:8443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # Nginx раздаёт медиафайлы напрямую
      - ./media:/app/media:ro
    depends_on:
      - app
