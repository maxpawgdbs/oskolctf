{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>Register</h2>
  {% if error %}<div class="flash err">{{ error }}</div>{% endif %}
  <form method="post">
    <input type="hidden" name="csrf" value="{{ csrf }}">
    <p><input name="username" placeholder="username (>=3)"></p>
    <p><input name="password" type="password" placeholder="password (>=6)"></p>
    <button type="submit">Создать аккаунт</button>
  </form>
</div>
{% endblock %}
