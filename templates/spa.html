<!DOCTYPE html>
<!-- vibecode front by nekoty -->
<html lang="ru">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OSKOLCTF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="/css/ui.css">
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.prod.js"></script>
  <style>
    /* ── Reset ── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      background: #0b0f17;
    }

    /* ── Page transitions ── */
    .fade-slide-enter-active {
      transition: opacity .28s ease, transform .28s ease;
    }

    .fade-slide-leave-active {
      transition: opacity .18s ease, transform .18s ease;
    }

    .fade-slide-enter-from {
      opacity: 0;
      transform: translateY(14px);
    }

    .fade-slide-leave-to {
      opacity: 0;
      transform: translateY(-10px);
    }

    /* ── Toast ── */
    .toast-enter-active {
      transition: all .38s cubic-bezier(.34, 1.56, .64, 1);
    }

    .toast-leave-active {
      transition: all .22s ease;
    }

    .toast-enter-from,
    .toast-leave-to {
      opacity: 0;
      transform: translateX(110%);
    }

    .toast-item {
      padding: 12px 18px;
      border-radius: 14px;
      font-size: 13px;
      font-weight: 700;
      pointer-events: all;
      cursor: default;
      backdrop-filter: blur(18px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, .45);
      border: 1px solid transparent;
      min-width: 240px;
    }

    .toast-ok {
      background: rgba(34, 197, 94, .14);
      border-color: rgba(34, 197, 94, .35);
      color: #4ade80;
    }

    .toast-err {
      background: rgba(239, 68, 68, .14);
      border-color: rgba(239, 68, 68, .35);
      color: #f87171;
    }

    .toast-info {
      background: rgba(99, 102, 241, .14);
      border-color: rgba(99, 102, 241, .35);
      color: #a5b4fc;
    }

    /* ── Keyframes ── */
    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      20% {
        transform: translateX(-9px);
      }

      40% {
        transform: translateX(8px);
      }

      60% {
        transform: translateX(-6px);
      }

      80% {
        transform: translateX(5px);
      }
    }

    @keyframes pop {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.03);
      }
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0;
      }
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    @keyframes fadeSlideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0) translateX(0);
        opacity: .6;
      }

      33% {
        transform: translateY(-40px) translateX(12px);
        opacity: .3;
      }

      66% {
        transform: translateY(-20px) translateX(-8px);
        opacity: .5;
      }
    }

    @keyframes gradShift {

      0%,
      100% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }
    }

    @keyframes glowPulse {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(34, 197, 94, 0);
      }

      50% {
        box-shadow: 0 0 18px 4px rgba(34, 197, 94, .18);
      }
    }

    @keyframes termTyping {
      from {
        opacity: 0;
        transform: translateX(-4px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .shake {
      animation: shake .45s ease;
    }

    .pop {
      animation: pop .35s ease;
    }

    .spin {
      animation: spin .8s linear infinite;
      display: inline-block;
    }

    /* ── Gradient text ── */
    .grad-text {
      background: linear-gradient(135deg, #6366f1, #8b5cf6, #06b6d4);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradShift 4s ease infinite;
    }

    /* ── HOME ── */
    .home-page {
      min-height: 100vh;
      background:
        radial-gradient(1100px 600px at 5% 20%, rgba(99, 102, 241, .18), transparent 60%),
        radial-gradient(800px 500px at 85% 15%, rgba(34, 197, 94, .12), transparent 55%),
        radial-gradient(600px 400px at 50% 80%, rgba(6, 182, 212, .10), transparent 50%),
        #0b0f17;
      color: var(--textOnDark);
      overflow: hidden;
      position: relative;
    }

    .particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: var(--size, 3px);
      height: var(--size, 3px);
      border-radius: 50%;
      background: var(--color, rgba(99, 102, 241, .55));
      left: var(--x, 50%);
      bottom: -10px;
      animation: float var(--dur, 8s) var(--delay, 0s) ease-in-out infinite;
    }

    .home-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 48px;
      align-items: center;
      padding: 72px 0 56px;
    }

    .hero-title {
      font-size: 54px;
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.03em;
      margin: 0 0 16px;
    }

    .hero-lead {
      color: var(--mutedOnDark);
      font-size: 16px;
      line-height: 1.6;
      font-weight: 500;
      margin: 0 0 28px;
      max-width: 480px;
    }

    .hero-btns {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    /* Terminal */
    .term-line {
      animation: termTyping .2s ease both;
    }

    .term-prompt {
      color: #4ade80;
      font-weight: 700;
      margin-right: 8px;
    }

    .term-cmd {
      color: rgba(229, 231, 235, .9);
    }

    .term-out {
      color: rgba(229, 231, 235, .6);
      font-style: italic;
    }

    .term-flag {
      color: #a5b4fc;
      font-weight: 700;
    }

    .term-cursor {
      animation: blink 1s step-end infinite;
      color: #6366f1;
    }

    /* Auth split */
    html:has(.auth),
    body:has(.auth) {
      height: 100%;
      margin: 0;
      background: #0b0f17;
    }

    .auth {
      height: 100vh;
      display: flex;
      color: var(--textOnDark);
      overflow: hidden;
    }

    .auth::before,
    .auth::after {
      display: none;
    }

    .auth-panel {
      flex-shrink: 0;
      width: 520px;
      height: 100%;
      overflow-y: auto;
      padding: 44px 48px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      background: #0b0f17;
    }

    .auth-photo {
      flex: 1 1 0;
      height: 100vh;
      overflow: hidden;
    }

    .auth-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Board */
    .board-root {
      min-height: 100vh;
      background: var(--bg);
      color: var(--textOnDark);
    }

    .board-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(255, 255, 255, .07);
      background: rgba(11, 15, 23, .85);
      backdrop-filter: blur(20px);
      padding: 14px 0;
    }

    .dark-card {
      background: rgba(255, 255, 255, .04);
      border: 1px solid rgba(255, 255, 255, .09);
      border-radius: var(--r-lg);
      box-shadow: 0 12px 45px rgba(0, 0, 0, .4);
    }

    .dark-card-h {
      padding: 12px 20px 14px;
      border-bottom: 1px solid rgba(255, 255, 255, .07);
    }

    .dark-card-b {
      padding: 18px 20px;
    }

    .dark-input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, .12);
      outline: none;
      font-weight: 500;
      background: rgba(255, 255, 255, .06);
      color: var(--textOnDark);
      font-family: inherit;
      transition: .15s ease;
    }

    .dark-input::placeholder {
      color: rgba(229, 231, 235, .35);
    }

    .dark-input:focus {
      border-color: rgba(99, 102, 241, .55);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, .12);
    }

    /* Board stats bar */
    .b-stats {
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, .04);
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: 16px;
      padding: 16px 28px;
      margin-bottom: 22px;
      flex-wrap: wrap;
      gap: 0;
    }

    .b-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1 1 0;
      min-width: 80px;
      gap: 5px;
    }

    .b-stat-v {
      font-size: 26px;
      font-weight: 900;
      letter-spacing: -0.03em;
      color: var(--textOnDark);
      line-height: 1;
    }

    .b-stat-of {
      font-size: 14px;
      font-weight: 600;
      opacity: .5;
    }

    .b-stat-l {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--mutedOnDark);
    }

    .b-sep {
      width: 1px;
      height: 40px;
      background: rgba(255, 255, 255, .08);
      margin: 0 4px;
      flex-shrink: 0;
    }

    /* Category filter */
    .cat-filter {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .cat-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, .11);
      background: rgba(255, 255, 255, .05);
      color: var(--mutedOnDark);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
      font-family: inherit;
    }

    .cat-btn:hover {
      background: rgba(255, 255, 255, .10);
      border-color: rgba(255, 255, 255, .20);
      color: var(--textOnDark);
    }

    .cat-btn.active {
      background: rgba(99, 102, 241, .20);
      border-color: rgba(99, 102, 241, .42);
      color: #a5b4fc;
    }

    .cat-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 20px;
      height: 20px;
      padding: 0 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .09);
      font-size: 11px;
      font-weight: 800;
      color: var(--mutedOnDark);
    }

    /* Tasks grid */
    .tasks-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    /* Task card */
    .task-card {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 18px 18px 14px;
      background: rgba(255, 255, 255, .04);
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: 18px;
      cursor: pointer;
      transition: all .18s ease;
      overflow: hidden;
      user-select: none;
      animation: fadeSlideIn .4s ease both;
    }

    .task-card:hover {
      background: rgba(99, 102, 241, .09);
      border-color: rgba(99, 102, 241, .38);
      transform: translateY(-2px);
      box-shadow: 0 10px 36px rgba(0, 0, 0, .4);
    }

    .task-card.is-solved {
      background: rgba(34, 197, 94, .05);
      border-color: rgba(34, 197, 94, .22);
    }

    .task-card.is-solved:hover {
      background: rgba(34, 197, 94, .11);
      border-color: rgba(34, 197, 94, .38);
    }

    .solved-ribbon {
      position: absolute;
      top: 12px;
      right: -20px;
      background: rgba(34, 197, 94, .18);
      color: #4ade80;
      font-size: 10px;
      font-weight: 800;
      padding: 3px 28px 3px 12px;
      letter-spacing: .05em;
      border: 1px solid rgba(34, 197, 94, .28);
      border-radius: 999px 0 0 999px;
    }

    .tc-top {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tc-name {
      margin: 0 0 6px;
      font-size: 16px;
      font-weight: 800;
      color: var(--textOnDark);
      letter-spacing: -.01em;
    }

    .tc-desc {
      margin: 0;
      font-size: 12px;
      color: var(--mutedOnDark);
      line-height: 1.55;
      font-weight: 500;
    }

    .tc-foot {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 4px;
    }

    .pts-chip {
      font-size: 13px;
      font-weight: 800;
      color: #a5b4fc;
      background: rgba(99, 102, 241, .14);
      border: 1px solid rgba(99, 102, 241, .28);
      border-radius: 999px;
      padding: 3px 10px;
    }

    .solves-chip {
      font-size: 12px;
      font-weight: 600;
      color: var(--mutedOnDark);
    }

    /* Category label colors */
    .cat-web {
      background: rgba(59, 130, 246, .14);
      border: 1px solid rgba(59, 130, 246, .32);
      color: #93c5fd;
    }

    .cat-разное {
      background: rgba(168, 85, 247, .12);
      border: 1px solid rgba(168, 85, 247, .30);
      color: #d8b4fe;
    }

    .cat-крипто {
      background: rgba(234, 179, 8, .11);
      border: 1px solid rgba(234, 179, 8, .28);
      color: #fde047;
    }

    .cat-форензика {
      background: rgba(20, 184, 166, .12);
      border: 1px solid rgba(20, 184, 166, .30);
      color: #5eead4;
    }

    .cat-реверс {
      background: rgba(249, 115, 22, .12);
      border: 1px solid rgba(249, 115, 22, .30);
      color: #fdba74;
    }

    .cat-pwn {
      background: rgba(239, 68, 68, .12);
      border: 1px solid rgba(239, 68, 68, .28);
      color: #fca5a5;
    }

    .cat-осинт {
      background: rgba(34, 197, 94, .11);
      border: 1px solid rgba(34, 197, 94, .26);
      color: #86efac;
    }

    .cat-label-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 800;
      padding: 3px 10px;
      border-radius: 999px;
      letter-spacing: .02em;
      text-transform: uppercase;
    }

    /* Difficulty */
    .diff-label-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 999px;
      border: 1px solid;
    }

    .diff-очень-лёгкое {
      background: rgba(34, 197, 94, .10);
      border-color: rgba(34, 197, 94, .26);
      color: #86efac;
    }

    .diff-лёгкое {
      background: rgba(34, 197, 94, .10);
      border-color: rgba(34, 197, 94, .24);
      color: #4ade80;
    }

    .diff-среднее {
      background: rgba(234, 179, 8, .11);
      border-color: rgba(234, 179, 8, .26);
      color: #fde047;
    }

    .diff-сложное {
      background: rgba(249, 115, 22, .11);
      border-color: rgba(249, 115, 22, .26);
      color: #fdba74;
    }

    .diff-очень-сложное {
      background: rgba(239, 68, 68, .11);
      border-color: rgba(239, 68, 68, .26);
      color: #fca5a5;
    }

    /* Board sidebar */
    .board-sidebar {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .board-layout {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 22px;
      align-items: start;
    }

    /* Leaderboard */
    .lb-row td {
      transition: background .3s ease;
    }

    .lb-row:hover td {
      background: rgba(255, 255, 255, .07) !important;
    }

    .lb-me td {
      background: rgba(99, 102, 241, .08) !important;
      border-color: rgba(99, 102, 241, .22) !important;
    }

    .rank-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 800;
      background: rgba(255, 255, 255, .06);
      color: var(--mutedOnDark);
    }

    .rank-1 {
      background: rgba(251, 191, 36, .18);
      color: #fbbf24;
    }

    .rank-2 {
      background: rgba(148, 163, 184, .15);
      color: #94a3b8;
    }

    .rank-3 {
      background: rgba(180, 83, 9, .18);
      color: #f97316;
    }

    /* Progress bar inside stats */
    .b-stats-progress {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 3px;
      border-radius: 0 0 16px 16px;
      background: rgba(255, 255, 255, .06);
      overflow: hidden;
    }

    .b-stats {
      position: relative;
    }

    .b-stats-progress-fill {
      height: 100%;
      border-radius: 0 0 16px 16px;
      background: linear-gradient(90deg, #6366f1, #22c55e);
      transition: width .6s cubic-bezier(.34, 1.56, .64, 1);
    }

    .refresh-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 8px #22c55e;
      animation: blink 2s ease infinite;
    }

    /* Task modal */
    .spa-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .72);
      backdrop-filter: blur(6px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease;
      padding: 20px;
    }

    .spa-modal-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .spa-modal-box {
      background: #131827;
      border: 1px solid rgba(255, 255, 255, .12);
      border-radius: 22px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 40px 100px rgba(0, 0, 0, .65);
      transform: scale(.95) translateY(10px);
      transition: transform .22s ease;
      overflow: hidden;
    }

    .spa-modal-overlay.open .spa-modal-box {
      transform: scale(1) translateY(0);
    }

    .spa-modal-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 22px 22px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, .08);
    }

    .spa-modal-title {
      margin: 0;
      font-size: 22px;
      font-weight: 900;
      color: var(--textOnDark);
      letter-spacing: -.02em;
    }

    .spa-modal-close {
      background: rgba(255, 255, 255, .07);
      border: 1px solid rgba(255, 255, 255, .12);
      border-radius: 999px;
      width: 34px;
      height: 34px;
      font-size: 20px;
      color: var(--mutedOnDark);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: .15s;
      font-family: inherit;
      line-height: 1;
    }

    .spa-modal-close:hover {
      background: rgba(255, 255, 255, .13);
      color: var(--textOnDark);
    }

    .spa-modal-body {
      padding: 20px 22px;
    }

    .spa-modal-section-label {
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--mutedOnDark);
      margin: 0 0 8px;
    }

    .spa-modal-desc {
      margin: 0;
      color: var(--textOnDark);
      font-size: 14px;
      font-weight: 500;
      line-height: 1.65;
    }

    .spa-modal-divider {
      height: 1px;
      background: rgba(255, 255, 255, .07);
      margin: 16px 0;
    }

    .spa-modal-stats {
      display: flex;
      align-items: center;
    }

    .spa-modal-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex: 1;
    }

    .spa-modal-stat-sep {
      width: 1px;
      height: 36px;
      background: rgba(255, 255, 255, .08);
      margin: 0 4px;
    }

    .spa-modal-stat-v {
      font-size: 22px;
      font-weight: 900;
      color: var(--textOnDark);
      letter-spacing: -.02em;
      line-height: 1;
    }

    .spa-modal-stat-l {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--mutedOnDark);
    }

    .spa-modal-footer {
      display: flex;
      gap: 10px;
      padding: 16px 22px 20px;
      border-top: 1px solid rgba(255, 255, 255, .08);
    }

    .spa-modal-footer .btn {
      flex: 1;
    }

    .solved-badge-sm {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 800;
      padding: 3px 10px;
      border-radius: 999px;
      border: 1px solid rgba(34, 197, 94, .32);
      background: rgba(34, 197, 94, .14);
      color: #4ade80;
      letter-spacing: .02em;
      text-transform: uppercase;
    }

    @media (max-width: 900px) {
      .home-grid {
        grid-template-columns: 1fr;
      }

      .hero-right {
        display: none;
      }

      async init() {

          fetch('/api/me').then(r => r.json()).catch(() => ({ user: null })),
          fetch('/api/csrf').then(r => r.json()).catch(() => ({ csrf: '' })),

        this.user = me.user;
        this.csrf = cs.csrf;
      },

      toast(message, type = 'info') {
        const id = Date.now() + Math.random();
        this.toasts.push({ id, message, type });
        setTimeout(() => {
          const i = this.toasts.findIndex(t => t.id === id);
          if (i !== -1) this.toasts.splice(i, 1);
        }, 4500);
      },

      async refreshCsrf() {
        const r = await fetch('/api/csrf').then(r => r.json()).catch(() => ({ csrf: '' }));
        this.csrf = r.csrf;
      },

      async logout() {
        await fetch('/api/auth/logout', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },

        await this.refreshCsrf();
      },

    /* ─────────────────── CONFETTI ─────────────────── */
    function launchConfetti(originEl) {
      const colors = ['#6366f1', '#22c55e', '#f59e0b', '#a78bfa', '#06b6d4', '#f472b6'];
      const rect = originEl
        ? originEl.getBoundingClientRect()
        : { x: window.innerWidth / 2, y: window.innerHeight / 3, width: 0, height: 0 };
      const cx = rect.x + rect.width / 2;
      const cy = rect.y + rect.height / 2;

      for (let i = 0; i < 70; i++) {
        const el = document.createElement('div');
        const color = colors[i % colors.length];
        const size = Math.random() * 9 + 5;
        const angle = (i / 70) * 360 + Math.random() * 20;
        const dist = Math.random() * 280 + 80;
        const dur = Math.random() * 1000 + 700;
        el.style.cssText = `
      position:fixed;left:${cx}px;top:${cy}px;
      width:${size}px;height:${size}px;
      border-radius:${Math.random() > .4 ? '50%' : '3px'};
      background:${color};pointer-events:none;z-index:9999;
      transition:transform ${dur}ms cubic-bezier(.17,.67,.3,.99),opacity ${dur}ms ease;
    `;
        document.body.appendChild(el);
        requestAnimationFrame(() => {
          const rad = (angle * Math.PI) / 180;
          el.style.transform = `translate(${Math.cos(rad) * dist}px,${Math.sin(rad) * dist}px) rotate(${Math.random() * 360}deg)`;
          el.style.opacity = '0';
        });
        setTimeout(() => el.remove(), dur + 100);
      }
    }

    /* ─────────────────── COMPONENT: AppToasts ─────────────────── */

    /* ─────────────────── PAGE: Home ─────────────────── */
    const particles = Array.from({ length: 20 }, (_, i) => ({

        '--size': `${(i % 4) + 2}px`,

      },
    }));

    const termLines = [
      { prompt: '~ $', text: 'whoami', out: false },
      { prompt: '', text: 'root', out: true },
      { prompt: '~ $', text: 'ls /challenges/', out: false },
      { prompt: '', text: 'task0  task1  task2  task3  task4', out: true },

    const HomePage = {

      },
      template: `
    <div class="home-page">
      <div class="particles" aria-hidden="true">

      </div>
      <div class="container">

              <span style="width:6px;height:6px;border-radius:50%;background:#6366f1;box-shadow:0 0 8px #6366f1;animation:blink 2s ease infinite;"></span>

            <p class="hero-lead">Платформа для тренировки offensive security. Задания на web, crypto, reverse engineering и forensics.</p>
            <div class="hero-btns">

    /* ─────────────────── PAGE: Login ─────────────────── */
    const LoginPage = {

      setup() {

        const username = ref('');

        const shaking = ref(false);

        async function submit() {

          if (res.ok) {

      template: `

          loading.value = true;
          const res = await fetch('/api/auth/register', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: username.value, password: password.value, csrf: store.csrf }),
          }).then(r => r.json()).catch(() => ({ ok: false, error: 'Ошибка сети' }));
          loading.value = false;

          if (res.ok) {

            store.toast('Аккаунт создан! Добро пожаловать!', 'ok');
            router.push('/board');

      },
      template: `

        <div style="font-size:18px;font-weight:800;letter-spacing:-0.02em;color:var(--textOnDark);">OSKOLCTF</div>

              <input class="input" v-model="password" type="password" placeholder="password (≥ 6 символов)" autocomplete="new-password"
                style="background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.13);color:var(--textOnDark);">
              <span class="hint" style="color:rgba(229,231,235,.45);">Минимум 6 символов</span>
            </div>
            <button type="submit" class="btn btn-primary btn-full" :disabled="loading" style="margin-top:6px;">
              <span v-if="loading" class="spin">⟳</span>
              <span v-else>Создать аккаунт</span>

    };

    /* ─────────────────── PAGE: Board ─────────────────── */
    const catIcons = {
      'Web': '🌐', 'Разное': '🎯', 'Крипто': '🔐',
      'Форензика': '🔬', 'Реверс': '⚙️', 'Pwn': '💥', 'ОСИНТ': '🕵️'
    };

    const BoardPage = {
      components: { MacBar },
      setup() {
        const router = useRouter();
        const flag = ref('');
        const tasks = ref([]);
        const board = ref([]);
        const pageLoad = ref(true);
        const submitting = ref(false);
        const shakeForm = ref(false);
        const popForm = ref(false);
        const activeModal = ref(null);
        const activeCat = ref('all');
        let timer = null;

        const solvedCount = computed(() => tasks.value.filter(t => t.solved).length);
        const totalCount = computed(() => tasks.value.length);
        const myScore = computed(() => tasks.value.filter(t => t.solved).reduce((s, t) => s + t.points, 0));
        const progress = computed(() => totalCount.value ? (solvedCount.value / totalCount.value) * 100 : 0);

        const categories = computed(() => {
          const seen = new Set();
          const cats = [];
          tasks.value.forEach(t => {
            if (!seen.has(t.category)) { seen.add(t.category); cats.push(t.category); }
          });
          return cats;
        });

        const filteredTasks = computed(() =>
          activeCat.value === 'all' ? tasks.value : tasks.value.filter(t => t.category === activeCat.value)
        );

        function catCount(cat) { return tasks.value.filter(t => t.category === cat).length; }
        function catClass(cat) { return 'cat-' + cat.toLowerCase(); }
        function catIcon(cat) { return catIcons[cat] || '🎯'; }
        function diffClass(diff) { return 'diff-' + diff.toLowerCase(); }

        async function loadBoard() {
          const res = await fetch('/api/board').then(r => r.json()).catch(() => null);
          if (!res) return;
          if (!res.ok) { router.push('/login'); return; }
          tasks.value = res.tasks;
          board.value = res.leaderboard;
          if (res.user) store.user = res.user;
          pageLoad.value = false;
        }

        async function submitFlag(e) {
          if (submitting.value || !flag.value.trim()) return;
          submitting.value = true;
          const btn = e.submitter;
          const res = await fetch('/api/submit', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ flag: flag.value.trim(), csrf: store.csrf }),
          }).then(r => r.json()).catch(() => ({ ok: false, error: 'Ошибка сети' }));
          submitting.value = false;
          await store.refreshCsrf();
          if (res.ok) {
            store.toast(res.message, 'ok');
            flag.value = '';
            popForm.value = true;
            setTimeout(() => popForm.value = false, 400);
            launchConfetti(btn);
            await loadBoard();
          } else {
            store.toast(res.error, res.category === 'info' ? 'info' : 'err');
            shakeForm.value = true;
            setTimeout(() => shakeForm.value = false, 500);
          }
        }

        function openModal(task) { activeModal.value = task; document.body.style.overflow = 'hidden'; }
        function closeModal() { activeModal.value = null; document.body.style.overflow = ''; }

        async function logout() { await store.logout(); router.push('/'); }

        onMounted(async () => {
          if (!store.user) {
            const me = await fetch('/api/me').then(r => r.json()).catch(() => ({ user: null }));
            store.user = me.user;
          }
          if (!store.user) { router.push('/login'); return; }
          await loadBoard();
          timer = setInterval(loadBoard, 30000);

          window.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
        });
        onUnmounted(() => {
          clearInterval(timer);
          document.body.style.overflow = '';
        });

        return {
          store, router, flag, tasks, board, pageLoad, submitting, shakeForm, popForm,
          activeModal, activeCat, solvedCount, totalCount, myScore, progress,
          categories, filteredTasks, catCount, catClass, catIcon, diffClass,
          submitFlag, logout, openModal, closeModal
        };
      },
      template: `

              <span style="font-size:11px;color:var(--mutedOnDark);font-weight:600;">борд · кейсы · таблица лидеров</span>
            </div>
            <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
              <div style="display:flex;align-items:center;gap:8px;padding:7px 12px;border-radius:999px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.11);font-size:12px;font-weight:800;color:var(--textOnDark);">
                👤 {{ store.user?.username }}
              </div>
              <button @click="logout" style="padding:7px 14px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.11);color:var(--textOnDark);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;">
                Выйти
              </button>
            </div>
          </div>
        </div>

      <!-- Loader -->
      <div v-if="pageLoad" style="display:flex;align-items:center;justify-content:center;gap:14px;padding:100px 0;color:var(--mutedOnDark);font-size:14px;">
        <span class="spin" style="font-size:26px;">⟳</span> Загрузка...
      </div>

      <!-- Content -->
      <div v-else class="container" style="padding:22px 0 64px;">

        <!-- Stats bar -->
        <div class="b-stats">
          <div class="b-stat">
            <span class="b-stat-v">{{ totalCount }}</span>
            <span class="b-stat-l">Заданий</span>
          </div>
          <div class="b-sep"></div>
          <div class="b-stat">
            <span class="b-stat-v">{{ solvedCount }}<span class="b-stat-of"> / {{ totalCount }}</span></span>
            <span class="b-stat-l">Решено мной</span>
          </div>
          <div class="b-sep"></div>
          <div class="b-stat">
            <span class="b-stat-v" style="color:#a5b4fc;">{{ myScore }}</span>
            <span class="b-stat-l">Мои очки</span>
          </div>
          <div class="b-sep"></div>
          <div class="b-stat">
            <span class="b-stat-v">{{ board.length }}</span>
            <span class="b-stat-l">Участников</span>
          </div>
          <div class="b-stats-progress">
            <div class="b-stats-progress-fill" :style="{width: progress + '%'}"></div>
          </div>
        </div>

        <!-- Board layout -->
        <div class="board-layout">

          <!-- Tasks section -->
          <div>
            <!-- Category filter -->
            <div class="cat-filter">
              <button class="cat-btn" :class="{active: activeCat==='all'}" @click="activeCat='all'">
                🗂 Все задания
                <span class="cat-count">{{ totalCount }}</span>
              </button>
              <button v-for="cat in categories" :key="cat"
                class="cat-btn" :class="{active: activeCat===cat}"
                @click="activeCat=cat">
                {{ catIcon(cat) }} {{ cat }}
                <span class="cat-count">{{ catCount(cat) }}</span>
              </button>
            </div>

            <!-- Tasks grid -->
            <div class="tasks-grid">
              <div v-for="(t, i) in filteredTasks" :key="t.id"
                class="task-card" :class="t.solved ? 'is-solved' : ''"
                :style="{'animation-delay': (i*0.05)+'s'}"
                @click="openModal(t)">

                <div v-if="t.solved" class="solved-ribbon">✓ Решено</div>

                <div class="tc-top">
                  <span class="cat-label-tag" :class="catClass(t.category)">
                    {{ catIcon(t.category) }} {{ t.category }}
                  </span>
                  <span class="diff-label-tag" :class="diffClass(t.difficulty)">{{ t.difficulty }}</span>
                </div>

                <div>
                  <h3 class="tc-name">{{ t.name }}</h3>
                  <p class="tc-desc">{{ t.description.slice(0,90) }}{{ t.description.length > 90 ? '…' : '' }}</p>
                </div>

                <div class="tc-foot">
                  <span class="pts-chip">{{ t.points }} pts</span>
                  <span class="solves-chip">👥 {{ t.solve_count }}</span>
                </div>
              </div>
            </div>
          </div>

          <!-- Sidebar -->
          <div class="board-sidebar">

            <!-- Submit flag -->
            <div class="dark-card" :class="{'pop': popForm}">
              <div class="dark-card-h">
                <mac-bar title="SUBMIT FLAG" />
                <div>
                  <p class="title" style="color:var(--textOnDark);font-size:17px;margin:0;">🚩 Сдать флаг</p>
                  <p class="subtitle" style="font-size:12px;">Формат: <span class="kbd">oskolctf{...}</span></p>
                </div>
              </div>
              <div class="dark-card-b">
                <form @submit.prevent="submitFlag($event)" :class="{'shake': shakeForm}">
                  <div class="field" style="margin-bottom:12px;">
                    <label style="font-size:12px;font-weight:600;color:rgba(229,231,235,.65);">Флаг</label>
                    <input class="dark-input" v-model="flag" placeholder="oskolctf{...}" autocomplete="off" spellcheck="false">
                  </div>
                  <button type="submit" class="btn btn-primary btn-full" :disabled="submitting">
                    <span v-if="submitting" class="spin">⟳</span>
                    <span v-else>Отправить →</span>
                  </button>
                </form>
              </div>
            </div>

            <!-- Leaderboard -->
            <div class="dark-card">
              <div class="dark-card-h">
                <mac-bar title="LEADERBOARD" />
                <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;">
                  <p class="title" style="color:var(--textOnDark);font-size:17px;margin:0;">🏆 Таблица лидеров</p>
                  <div style="display:flex;align-items:center;gap:6px;">
                    <div class="refresh-dot"></div>
                    <span style="font-size:11px;font-weight:600;color:rgba(229,231,235,.3);">live</span>
                  </div>
                </div>
              </div>
              <div class="dark-card-b" style="padding:12px 14px;">
                <table class="table">
                  <thead>
                    <tr>
                      <th style="color:var(--mutedOnDark);">#</th>
                      <th style="color:var(--mutedOnDark);">Участник</th>
                      <th style="color:var(--mutedOnDark);">Очки</th>
                      <th style="color:var(--mutedOnDark);">✓</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr v-for="(r, i) in board" :key="r.username"
                      class="lb-row" :class="r.username === store.user?.username ? 'lb-me' : ''"
                      :style="{animationDelay:(i*0.04)+'s',animation:'fadeSlideIn .4s ease both'}">
                      <td style="background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.06);">
                        <span v-if="i<3" style="font-size:18px;line-height:1;">{{ i===0?'🥇':i===1?'🥈':'🥉' }}</span>
                        <span v-else class="rank-badge">{{ i+1 }}</span>
                      </td>
                      <td style="background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.06);"
                        :style="{color:r.username===store.user?.username?'#a5b4fc':'var(--textOnDark)',fontWeight:r.username===store.user?.username?'800':'600'}">
                        {{ r.username }}
                        <span v-if="r.username===store.user?.username" style="font-size:10px;opacity:.45;margin-left:4px;">(ты)</span>
                      </td>
                      <td style="background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.06);">
                        <span style="font-size:12px;padding:3px 9px;border-radius:999px;font-weight:700;background:rgba(99,102,241,.14);border:1px solid rgba(99,102,241,.3);color:#a5b4fc;">{{ r.score }}</span>
                      </td>
                      <td style="background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.06);color:var(--mutedOnDark);">{{ r.solved_count }}</td>
                    </tr>
                    <tr v-if="!board.length">
                      <td colspan="4" style="text-align:center;padding:24px;color:var(--mutedOnDark);background:rgba(255,255,255,.02);border-color:rgba(255,255,255,.05);">Пока никого нет...</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>

          </div>
        </div><!-- /board-layout -->
      </div><!-- /content -->

      <!-- Task Modal -->
      <div class="spa-modal-overlay" :class="{open: activeModal}" @click.self="closeModal()">
        <div class="spa-modal-box" v-if="activeModal" role="dialog" aria-modal="true">
          <div class="spa-modal-head">
            <div style="flex:1;">
              <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;">
                <span class="cat-label-tag" :class="catClass(activeModal.category)">
                  {{ catIcon(activeModal.category) }} {{ activeModal.category }}
                </span>
                <span class="diff-label-tag" :class="diffClass(activeModal.difficulty)">{{ activeModal.difficulty }}</span>
                <span v-if="activeModal.solved" class="solved-badge-sm">✓ Решено</span>
              </div>
              <h2 class="spa-modal-title">{{ activeModal.name }}</h2>
            </div>
            <button class="spa-modal-close" @click="closeModal()">×</button>
          </div>

          <div class="spa-modal-body">
            <div>
              <p class="spa-modal-section-label">📋 Описание задания</p>
              <p class="spa-modal-desc">{{ activeModal.description }}</p>
            </div>
            <div class="spa-modal-divider"></div>
            <div class="spa-modal-stats">
              <div class="spa-modal-stat">
                <span class="spa-modal-stat-v" style="color:#a5b4fc;">{{ activeModal.points }}</span>
                <span class="spa-modal-stat-l">очков</span>
              </div>
              <div class="spa-modal-stat-sep"></div>
              <div class="spa-modal-stat">
                <span class="spa-modal-stat-v">{{ activeModal.solve_count }}</span>
                <span class="spa-modal-stat-l">решили</span>
              </div>
              <template v-if="activeModal.solved">
                <div class="spa-modal-stat-sep"></div>
                <div class="spa-modal-stat">
                  <span class="spa-modal-stat-v" style="color:#4ade80;">✓</span>
                  <span class="spa-modal-stat-l" style="color:#4ade80;">решено</span>
                </div>
              </template>
            </div>
          </div>

          <div class="spa-modal-footer">
            <a class="btn btn-primary" :href="activeModal.link" target="_blank" rel="noopener" @click="closeModal()">
              Открыть задание →
            </a>
            <button class="btn btn-ghost" @click="closeModal()">Закрыть</button>
          </div>
        </div>
      </div>

    </div><!-- /board-root -->
  `,
    };

    /* ─────────────────── ROUTER ─────────────────── */
    const router = createRouter({
      history: createWebHistory(),
      routes: [
        { path: '/', component: HomePage },
        { path: '/login', component: LoginPage },
        { path: '/register', component: RegisterPage },
        { path: '/board', component: BoardPage },
        { path: '/:_(.*)*', redirect: '/' },
      ],
    });

    /* ─────────────────── APP ─────────────────── */
    const App = createApp({
      components: { AppToasts },
      setup() {
        onMounted(() => store.init());
        return {};
      },
      template: `
    <app-toasts />
    <router-view v-slot="{ Component }">
      <Transition name="fade-slide" mode="out-in">
        <component :is="Component" :key="$route.path" />
      </Transition>
    </router-view>
  `,
    });

    App.use(router);
    App.mount('#app');

    /* vibecode front by nekoty */
    console.log(
      '%c vibecode front by nekoty ',
      'background:#6366f1;color:#fff;font-weight:900;font-size:13px;border-radius:8px;padding:4px 10px;letter-spacing:.05em;'
    );
  </script>
</body>

</html>
