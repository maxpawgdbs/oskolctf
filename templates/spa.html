<!DOCTYPE html>
<!-- vibecode front by nekoty -->
<html lang="ru">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Этика взлома</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="/css/ui.css">
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.prod.js"></script>
  <style>
    /* ── Reset ── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      background: #0b0f17;
    }

    /* ── Page transitions ── */
    .fade-slide-enter-active {
      transition: opacity .28s ease, transform .28s ease;
    }

    .fade-slide-leave-active {
      transition: opacity .18s ease, transform .18s ease;
    }

    .fade-slide-enter-from {
      opacity: 0;
      transform: translateY(14px);
    }

    .fade-slide-leave-to {
      opacity: 0;
      transform: translateY(-10px);
    }

    /* ── Toast ── */
    .toast-enter-active {
      transition: all .38s cubic-bezier(.34, 1.56, .64, 1);
    }

    .toast-leave-active {
      transition: all .22s ease;
    }

    .toast-enter-from,
    .toast-leave-to {
      opacity: 0;
      transform: translateX(110%);
    }

    .toast-item {
      padding: 12px 18px;
      border-radius: 14px;
      font-size: 13px;
      font-weight: 700;
      pointer-events: all;
      cursor: default;
      backdrop-filter: blur(18px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, .45);
      border: 1px solid transparent;
      min-width: 240px;
    }

    .toast-ok {
      background: rgba(34, 197, 94, .14);
      border-color: rgba(34, 197, 94, .35);
      color: #4ade80;
    }

    .toast-err {
      background: rgba(239, 68, 68, .14);
      border-color: rgba(239, 68, 68, .35);
      color: #f87171;
    }

    .toast-info {
      background: rgba(99, 102, 241, .14);
      border-color: rgba(99, 102, 241, .35);
      color: #a5b4fc;
    }

    /* ── Keyframes ── */
    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      20% {
        transform: translateX(-9px);
      }

      40% {
        transform: translateX(8px);
      }

      60% {
        transform: translateX(-6px);
      }

      80% {
        transform: translateX(5px);
      }
    }

    @keyframes pop {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.03);
      }
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0;
      }
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    @keyframes fadeSlideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0) translateX(0);
        opacity: .6;
      }

      33% {
        transform: translateY(-40px) translateX(12px);
        opacity: .3;
      }

      66% {
        transform: translateY(-20px) translateX(-8px);
        opacity: .5;
      }
    }

    @keyframes gradShift {

      0%,
      100% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }
    }

    @keyframes glowPulse {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(34, 197, 94, 0);
      }

      50% {
        box-shadow: 0 0 18px 4px rgba(34, 197, 94, .18);
      }
    }

    @keyframes termTyping {
      from {
        opacity: 0;
        transform: translateX(-4px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .shake {
      animation: shake .45s ease;
    }

    .pop {
      animation: pop .35s ease;
    }

    .spin {
      animation: spin .8s linear infinite;
      display: inline-block;
    }

    /* ── Gradient text ── */
    .grad-text {
      background: linear-gradient(135deg, #6366f1, #8b5cf6, #06b6d4);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradShift 4s ease infinite;
    }

    /* ── HOME ── */
    .home-page {
      min-height: 100vh;
      background:
        radial-gradient(1100px 600px at 5% 20%, rgba(99, 102, 241, .18), transparent 60%),
        radial-gradient(800px 500px at 85% 15%, rgba(34, 197, 94, .12), transparent 55%),
        radial-gradient(600px 400px at 50% 80%, rgba(6, 182, 212, .10), transparent 50%),
        #0b0f17;
      color: var(--textOnDark);
      overflow: hidden;
      position: relative;
    }

    .particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: var(--size, 3px);
      height: var(--size, 3px);
      border-radius: 50%;
      background: var(--color, rgba(99, 102, 241, .55));
      left: var(--x, 50%);
      bottom: -10px;
      animation: float var(--dur, 8s) var(--delay, 0s) ease-in-out infinite;
    }

    .home-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 48px;
      align-items: center;
      padding: 72px 0 56px;
    }

    .hero-title {
      font-size: 54px;
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.03em;
      margin: 0 0 16px;
    }

    .hero-lead {
      color: var(--mutedOnDark);
      font-size: 16px;
      line-height: 1.6;
      font-weight: 500;
      margin: 0 0 28px;
      max-width: 480px;
    }

    .hero-btns {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    /* Terminal */
    .term-line {
      animation: termTyping .2s ease both;
    }

    .term-prompt {
      color: #4ade80;
      font-weight: 700;
      margin-right: 8px;
    }

    .term-cmd {
      color: rgba(229, 231, 235, .9);
    }

    .term-out {
      color: rgba(229, 231, 235, .6);
      font-style: italic;
    }

    .term-flag {
      color: #a5b4fc;
      font-weight: 700;
    }

    .term-cursor {
      animation: blink 1s step-end infinite;
      color: #6366f1;
    }

    /* Auth split */
    html:has(.auth),
    body:has(.auth) {
      height: 100%;
      margin: 0;
      background: #0b0f17;
    }

    .auth {
      height: 100vh;
      display: flex;
      color: var(--textOnDark);
      overflow: hidden;
    }

    .auth::before,
    .auth::after {
      display: none;
    }

    .auth-panel {
      flex-shrink: 0;
      width: 520px;
      height: 100%;
      overflow-y: auto;
      padding: 44px 48px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      background: #0b0f17;
    }

    .auth-photo {
      flex: 1 1 0;
      height: 100vh;
      overflow: hidden;
    }

    .auth-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Board */
    .board-root {
      min-height: 100vh;
      background: var(--bg);
      color: var(--textOnDark);
    }

    .board-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(255, 255, 255, .07);
      background: rgba(11, 15, 23, .85);
      backdrop-filter: blur(20px);
      padding: 14px 0;
    }

    .dark-card {
      background: rgba(255, 255, 255, .04);
      border: 1px solid rgba(255, 255, 255, .09);
      border-radius: var(--r-lg);
      box-shadow: 0 12px 45px rgba(0, 0, 0, .4);
    }

    .dark-card-h {
      padding: 12px 20px 14px;
      border-bottom: 1px solid rgba(255, 255, 255, .07);
    }

    .dark-card-b {
      padding: 18px 20px;
    }

    .dark-input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, .12);
      outline: none;
      font-weight: 500;
      background: rgba(255, 255, 255, .06);
      color: var(--textOnDark);
      font-family: inherit;
      transition: .15s ease;
    }

    .dark-input::placeholder {
      color: rgba(229, 231, 235, .35);
    }

    .dark-input:focus {
      border-color: rgba(99, 102, 241, .55);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, .12);
    }

    /* Board stats bar */
    .b-stats {
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, .04);
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: 16px;
      padding: 16px 28px;
      margin-bottom: 22px;
      flex-wrap: wrap;
      gap: 0;
    }

    .b-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1 1 0;
      min-width: 80px;
      gap: 5px;
    }

    .b-stat-v {
      font-size: 26px;
      font-weight: 900;
      letter-spacing: -0.03em;
      color: var(--textOnDark);
      line-height: 1;
    }

    .b-stat-of {
      font-size: 14px;
      font-weight: 600;
      opacity: .5;
    }

    .b-stat-l {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--mutedOnDark);
    }

    .b-sep {
      width: 1px;
      height: 40px;
      background: rgba(255, 255, 255, .08);
      margin: 0 4px;
      flex-shrink: 0;
    }

    /* Category filter */
    .cat-filter {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .cat-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, .11);
      background: rgba(255, 255, 255, .05);
      color: var(--mutedOnDark);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
      font-family: inherit;
    }

    .cat-btn:hover {
      background: rgba(255, 255, 255, .10);
      border-color: rgba(255, 255, 255, .20);
      color: var(--textOnDark);
    }

    .cat-btn.active {
      background: rgba(99, 102, 241, .20);
      border-color: rgba(99, 102, 241, .42);
      color: #a5b4fc;
    }

    .cat-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 20px;
      height: 20px;
      padding: 0 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .09);
      font-size: 11px;
      font-weight: 800;
      color: var(--mutedOnDark);
    }

    /* Tasks grid */
    .tasks-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    /* Task card */
    .task-card {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 18px 18px 14px;
      background: rgba(255, 255, 255, .04);
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: 18px;
      cursor: pointer;
      transition: all .18s ease;
      overflow: hidden;
      user-select: none;
      animation: fadeSlideIn .4s ease both;
    }

    .task-card:hover {
      background: rgba(99, 102, 241, .09);
      border-color: rgba(99, 102, 241, .38);
      transform: translateY(-2px);
      box-shadow: 0 10px 36px rgba(0, 0, 0, .4);
    }

    .task-card.is-solved {
      background: rgba(34, 197, 94, .05);
      border-color: rgba(34, 197, 94, .22);
    }

    .task-card.is-solved:hover {
      background: rgba(34, 197, 94, .11);
      border-color: rgba(34, 197, 94, .38);
    }

    .solved-ribbon {
      position: absolute;
      top: 12px;
      right: -20px;
      background: rgba(34, 197, 94, .18);
      color: #4ade80;
      font-size: 10px;
      font-weight: 800;
      padding: 3px 28px 3px 12px;
      letter-spacing: .05em;
      border: 1px solid rgba(34, 197, 94, .28);
      border-radius: 999px 0 0 999px;
    }

    .tc-top {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tc-name {
      margin: 0 0 6px;
      font-size: 16px;
      font-weight: 800;
      color: var(--textOnDark);
      letter-spacing: -.01em;
    }

    .tc-desc {
      margin: 0;
      font-size: 12px;
      color: var(--mutedOnDark);
      line-height: 1.55;
      font-weight: 500;
    }

    .tc-foot {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 4px;
    }

    .pts-chip {
      font-size: 13px;
      font-weight: 800;
      color: #a5b4fc;
      background: rgba(99, 102, 241, .14);
      border: 1px solid rgba(99, 102, 241, .28);
      border-radius: 999px;
      padding: 3px 10px;
    }

    .solves-chip {
      font-size: 12px;
      font-weight: 600;
      color: var(--mutedOnDark);
    }

    /* Category label colors */
    .cat-web {
      background: rgba(59, 130, 246, .14);
      border: 1px solid rgba(59, 130, 246, .32);
      color: #93c5fd;
    }

    .cat-разное {
      background: rgba(168, 85, 247, .12);
      border: 1px solid rgba(168, 85, 247, .30);
      color: #d8b4fe;
    }

    .cat-крипто {
      background: rgba(234, 179, 8, .11);
      border: 1px solid rgba(234, 179, 8, .28);
      color: #fde047;
    }

    .cat-форензика {
      background: rgba(20, 184, 166, .12);
      border: 1px solid rgba(20, 184, 166, .30);
      color: #5eead4;
    }

    .cat-реверс {
      background: rgba(249, 115, 22, .12);
      border: 1px solid rgba(249, 115, 22, .30);
      color: #fdba74;
    }

    .cat-pwn {
      background: rgba(239, 68, 68, .12);
      border: 1px solid rgba(239, 68, 68, .28);
      color: #fca5a5;
    }

    .cat-осинт {
      background: rgba(34, 197, 94, .11);
      border: 1px solid rgba(34, 197, 94, .26);
      color: #86efac;
    }

    .cat-label-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 800;
      padding: 3px 10px;
      border-radius: 999px;
      letter-spacing: .02em;
      text-transform: uppercase;
    }

    /* Difficulty */
    .diff-label-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 999px;
      border: 1px solid;
    }

    .diff-очень-лёгкое {
      background: rgba(34, 197, 94, .10);
      border-color: rgba(34, 197, 94, .26);
      color: #86efac;
    }

    .diff-лёгкое {
      background: rgba(34, 197, 94, .10);
      border-color: rgba(34, 197, 94, .24);
      color: #4ade80;
    }

    .diff-среднее {
      background: rgba(234, 179, 8, .11);
      border-color: rgba(234, 179, 8, .26);
      color: #fde047;
    }

    .diff-сложное {
      background: rgba(249, 115, 22, .11);
      border-color: rgba(249, 115, 22, .26);
      color: #fdba74;
    }

    .diff-очень-сложное {
      background: rgba(239, 68, 68, .11);
      border-color: rgba(239, 68, 68, .26);
      color: #fca5a5;
    }

    /* Board sidebar */
    .board-sidebar {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .board-layout {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 22px;
      align-items: start;
    }

    /* Leaderboard */
    .lb-row td {
      transition: background .3s ease;
    }

    .lb-row:hover td {
      background: rgba(255, 255, 255, .07) !important;
    }

    .lb-me td {
      background: rgba(99, 102, 241, .08) !important;
      border-color: rgba(99, 102, 241, .22) !important;
    }

    .rank-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 800;
      background: rgba(255, 255, 255, .06);
      color: var(--mutedOnDark);
    }

    .rank-1 {
      background: rgba(251, 191, 36, .18);
      color: #fbbf24;
    }

    .rank-2 {
      background: rgba(148, 163, 184, .15);
      color: #94a3b8;
    }

    .rank-3 {
      background: rgba(180, 83, 9, .18);
      color: #f97316;
    }

    /* Progress bar inside stats */
    .b-stats-progress {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 3px;
      border-radius: 0 0 16px 16px;
      background: rgba(255, 255, 255, .06);
      overflow: hidden;
    }

    .b-stats {
      position: relative;
    }

    .b-stats-progress-fill {
      height: 100%;
      border-radius: 0 0 16px 16px;
      background: linear-gradient(90deg, #6366f1, #22c55e);
      transition: width .6s cubic-bezier(.34, 1.56, .64, 1);
    }

    .refresh-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 8px #22c55e;
      animation: blink 2s ease infinite;
    }

    /* Task modal */
    .spa-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .72);
      backdrop-filter: blur(6px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease;
      padding: 20px;
    }

    .spa-modal-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .spa-modal-box {
      background: #131827;
      border: 1px solid rgba(255, 255, 255, .12);
      border-radius: 22px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 40px 100px rgba(0, 0, 0, .65);
      transform: scale(.95) translateY(10px);
      transition: transform .22s ease;
      overflow: hidden;
    }

    .spa-modal-overlay.open .spa-modal-box {
      transform: scale(1) translateY(0);
    }

    .spa-modal-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 22px 22px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, .08);
    }

    .spa-modal-title {
      margin: 0;
      font-size: 22px;
      font-weight: 900;
      color: var(--textOnDark);
      letter-spacing: -.02em;
    }

    .spa-modal-close {
      background: rgba(255, 255, 255, .07);
      border: 1px solid rgba(255, 255, 255, .12);
      border-radius: 999px;
      width: 34px;
      height: 34px;
      font-size: 20px;
      color: var(--mutedOnDark);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: .15s;
      font-family: inherit;
      line-height: 1;
    }

    .spa-modal-close:hover {
      background: rgba(255, 255, 255, .13);
      color: var(--textOnDark);
    }

    .spa-modal-body {
      padding: 20px 22px;
    }

    .spa-modal-section-label {
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--mutedOnDark);
      margin: 0 0 8px;
    }

    .spa-modal-desc {
      margin: 0;
      color: var(--textOnDark);
      font-size: 14px;
      font-weight: 500;
      line-height: 1.65;
    }

    .spa-modal-divider {
      height: 1px;
      background: rgba(255, 255, 255, .07);
      margin: 16px 0;
    }

    .spa-modal-stats {
      display: flex;
      align-items: center;
    }

    .spa-modal-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex: 1;
    }

    .spa-modal-stat-sep {
      width: 1px;
      height: 36px;
      background: rgba(255, 255, 255, .08);
      margin: 0 4px;
    }

    .spa-modal-stat-v {
      font-size: 22px;
      font-weight: 900;
      color: var(--textOnDark);
      letter-spacing: -.02em;
      line-height: 1;
    }

    .spa-modal-stat-l {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--mutedOnDark);
    }

    .spa-modal-footer {
      display: flex;
      gap: 10px;
      padding: 16px 22px 20px;
      border-top: 1px solid rgba(255, 255, 255, .08);
    }

    .spa-modal-footer .btn {
      flex: 1;
    }

    .solved-badge-sm {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 800;
      padding: 3px 10px;
      border-radius: 999px;
      border: 1px solid rgba(34, 197, 94, .32);
      background: rgba(34, 197, 94, .14);
      color: #4ade80;
      letter-spacing: .02em;
      text-transform: uppercase;
    }

    @media (max-width: 900px) {
      .home-grid {
        grid-template-columns: 1fr;
      }

      .hero-right {

      const W = 620, H = 220;
      const padL = 52, padR = 20, padT = 20, padB = 46;
      const cW = W - padL - padR, cH = H - padT - padB;

      const dates = tasks.map(t => new Date(t.solved_at).getTime());
      const minDate = Math.min(...dates);
      const lastDate = Math.max(...dates);
      const rangeMs = lastDate - minDate || 86400000;
      const extend = Math.max(rangeMs * 0.08, 3600000 * 3);
      const maxDate = lastDate + extend;
      const dRange = maxDate - minDate;
      const maxScore = tasks[tasks.length - 1].cumulative_score || 1;

      const cx = ts => padL + (ts - minDate) / dRange * cW;
      const cy = s => padT + cH - (s / maxScore) * cH;

      // Points: (minDate,0), each solve, (maxDate, lastScore)
      const pts = [{ x: cx(minDate), y: cy(0) }];
      for (const t of tasks) pts.push({ x: cx(new Date(t.solved_at).getTime()), y: cy(t.cumulative_score) });
      pts.push({ x: cx(maxDate), y: cy(tasks[tasks.length - 1].cumulative_score) });

      // ── Monotone cubic Hermite (Fritsch–Carlson) ────────────────────────────
      const n = pts.length;
      const dxArr = [], slopeArr = [], m = new Array(n);
      for (let i = 0; i < n - 1; i++) {
        dxArr[i] = pts[i + 1].x - pts[i].x;
        slopeArr[i] = dxArr[i] > 0.5 ? (pts[i + 1].y - pts[i].y) / dxArr[i] : 0;
      }
      m[0] = slopeArr[0];
      m[n - 1] = slopeArr[n - 2];
      for (let i = 1; i < n - 1; i++) {
        m[i] = slopeArr[i - 1] * slopeArr[i] <= 0 ? 0 : (slopeArr[i - 1] + slopeArr[i]) / 2;
      }
      for (let i = 0; i < n - 1; i++) {
        if (Math.abs(slopeArr[i]) < 1e-10) { m[i] = m[i + 1] = 0; continue; }
        const a = m[i] / slopeArr[i], b = m[i + 1] / slopeArr[i], sq = a * a + b * b;
        if (sq > 9) { const tau = 3 / Math.sqrt(sq); m[i] = tau * a * slopeArr[i]; m[i + 1] = tau * b * slopeArr[i]; }
      }

      // Build SVG path with cubic bezier segments
      let path = `M ${pts[0].x.toFixed(2)},${pts[0].y.toFixed(2)}`;
      for (let i = 0; i < n - 1; i++) {
        const h = dxArr[i];
        path += ` C ${(pts[i].x + h / 3).toFixed(2)},${(pts[i].y + m[i] * h / 3).toFixed(2)}`
          + ` ${(pts[i + 1].x - h / 3).toFixed(2)},${(pts[i + 1].y - m[i + 1] * h / 3).toFixed(2)}`
          + ` ${pts[i + 1].x.toFixed(2)},${pts[i + 1].y.toFixed(2)}`;
      }
      const linePath = path;
      const areaPath = path + ` L ${pts[n - 1].x.toFixed(2)},${cy(0).toFixed(2)} L ${pts[0].x.toFixed(2)},${cy(0).toFixed(2)} Z`;

      // Dots for tooltip
      const dots = tasks.map(t => ({
        x: cx(new Date(t.solved_at).getTime()), y: cy(t.cumulative_score),
        name: t.name, pts: t.points, score: t.cumulative_score,
      }));

      // Y grid (6 levels)
      const gridY = [0, 0.2, 0.4, 0.6, 0.8, 1].map(frac => {
        const score = Math.round(maxScore * frac);
        return { y: cy(score), lbl: score >= 1000 ? (score / 1000).toFixed(1) + 'k' : String(score) };
      });

      // X grid — adaptive interval by day range
      const hourMs = 3600000, dayMs = 86400000;
      let tickMs;
      if (dRange <= dayMs) tickMs = 4 * hourMs;
      else if (dRange <= 3 * dayMs) tickMs = 12 * hourMs;
      else if (dRange <= 14 * dayMs) tickMs = dayMs;
      else if (dRange <= 60 * dayMs) tickMs = 2 * dayMs;
      else tickMs = 7 * dayMs;

      const startTick = Math.ceil(minDate / tickMs) * tickMs;
      const gridX = [];
      for (let ts = startTick; ts <= maxDate; ts += tickMs) {
        const xPos = cx(ts);
        if (xPos < padL + 4 || xPos > W - padR - 2) continue;
        const date = new Date(ts);
        const label = tickMs >= dayMs
          ? date.toLocaleDateString('ru', { day: 'numeric', month: 'short' })
          : date.toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' });
        gridX.push({ x: xPos, label });
      }

      return { W, H, padL, padR, padT, padB, cH, linePath, areaPath, dots, gridY, gridX };
    }

    // Stable, random browser identifier. It is a secondary abuse signal, not authentication.
    let clientSignature = localStorage.getItem('oskolctf-client-signature');

        const categories = computed(() => {
          const seen = new Set();
          const cats = [];
          tasks.value.forEach(t => {

          });
          return cats;

        const filteredTasks = computed(() =>
          activeCat.value === 'all' ? tasks.value : tasks.value.filter(t => t.category === activeCat.value)

        function diffClass(diff) { return 'diff-' + diff.toLowerCase(); }

        async function loadBoard() {
          const res = await fetch('/api/board').then(r => r.json()).catch(() => null);

    const ProfilePage = {
      setup() {
        const router = useRouter();
        const profile = ref(null);
        const loading = ref(true);
        const editMode = ref(false);
        const editName = ref('');
        const editBio = ref('');
        const pwMode = ref(false);
        const oldPw = ref('');
        const newPw = ref('');
        const saving = ref(false);
        const fileInput = ref(null);

        async function loadProfile() {
          if (!store.user) {
            const me = await fetch('/api/me').then(r => r.json()).catch(() => ({ user: null }));
            store.user = me.user;
          }
          if (!store.user) { router.push('/login'); return; }
          const r = await fetch('/api/profile/' + store.user.username).then(r => r.json()).catch(() => null);
          if (r?.ok) {
            profile.value = r.profile;
            editName.value = r.profile.display_name || '';
            editBio.value = r.profile.bio || '';
          }
          loading.value = false;
        }

        async function saveProfile() {
          saving.value = true;
          const r = await fetch('/api/profile/update', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': store.csrf },
            body: JSON.stringify({ display_name: editName.value, bio: editBio.value }),
            credentials: 'same-origin',
          }).then(r => r.json()).catch(() => ({ ok: false, error: 'Ошибка сети' }));
          saving.value = false;
          if (r.ok) {
            profile.value.display_name = r.display_name;
            profile.value.bio = r.bio;
            store.user.display_name = r.display_name;
            store.user.avatar = r.avatar;
            editMode.value = false;
            store.toast('Профиль обновлён', 'ok');
          } else {
            store.toast(r.error, 'err');
          }
        }

        async function uploadAvatar(e) {
          const file = e.target.files[0];
          if (!file) return;
